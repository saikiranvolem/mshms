

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: none;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Dashboard</h1>
        <div class="row">
            <div class="col-lg-6 mb-3">
                <a href="/patients" class="card text-center" style="text-decoration: none; color: inherit; display: block;">
                    <div class="card-body">
                        <h5 class="card-title">Patients</h5>
                    </div>
                </a>
            </div>
            <div class="col-lg-6 mb-3">
                <a href="/doctors" class="card text-center" style="text-decoration: none; color: inherit; display: block;">
                    <div class="card-body">
                        <h5 class="card-title">Doctors</h5>
                    </div>
                </a>
            </div>
            <div class="col-lg-6 mb-3">
                <a href="/appointments" class="card text-center" style="text-decoration: none; color: inherit; display: block;">
                    <div class="card-body">
                        <h5 class="card-title">Appointments</h5>
                    </div>
                </a>
            </div>
            <div class="col-lg-6 mb-3">
                <a href="/logout" class="card text-center" style="text-decoration: none; color: inherit; display: block;">
                    <div class="card-body">
                        <h5 class="card-title">Logout</h5>
                    </div>
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
