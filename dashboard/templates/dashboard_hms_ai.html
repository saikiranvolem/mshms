

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS AI Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: none;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">HMS AI Chat</h1>
        <div class="row">
            <div class="col-lg-12 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Ask a Question</h5>
                        <p class="card-text">Ask any question to AI about our HMS</p>
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <textarea name="query" class="form-control" rows="4" placeholder="Enter a Question"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Answer</button>
                        </form>
                    </div>
                </div>
            </div>
            {% if answer %}
            <div class="col-lg-12 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">AI Response</h5>
                        <div>{{ answer|safe }}</div>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
