<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card" style="background-color: #add8e6;">
                    <div class="card-body">
                        <h2 class="card-title mb-4">Update Appointment</h2>
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="doctor" class="form-label">Doctor Name</label>
                                <input type="text" class="form-control" id="doctor" name="doctor" value="{{ appointment.doctor_name }}">
                            </div>
                            <div class="mb-3">
                                <label for="patient" class="form-label">Patient Name</label>
                                <input type="text" class="form-control" id="patient" name="patient" value="{{ appointment.patient_name }}">
                            </div>
                            <div class="mb-3">
                                <label for="time" class="form-label">Appointment Time</label>
                                <input type="datetime-local" class="form-control" id="time" name="time" value="{{ appointment.time|date:'Y-m-d\TH:i' }}">
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Update Appointment</button>
                                <a href="/appointments" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
